<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>weixin-clip 选项</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1.25rem;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      .hint {
        color: #555;
        font-size: 0.9rem;
      }
      .status {
        margin-top: 1rem;
        white-space: pre-wrap;
      }
      code {
        background: #f2f2f2;
        padding: 0.1rem 0.35rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>weixin-clip — 保存目录</h1>
    <p class="hint">
      使用 File System Access API 选择本机文件夹（例如
      <code>obsidian-wiki/raw/general/wechat-clips</code>）。句柄保存在本扩展的
      IndexedDB 中，刷新后无需重选。
    </p>
    <p>
      <button type="button" id="pick">选择目录…</button>
      <button type="button" id="clear">清除已绑定目录</button>
    </p>
    <p id="status" class="status" aria-live="polite"></p>
    <script src="idb-store.js"></script>
    <script src="options.js"></script>
  </body>
</html>
